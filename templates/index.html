<!DOCTYPE html>
<html>
<head>
    <title>Neural Product Discovery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; }
        .search-box { border-radius: 30px; padding: 12px 25px; border: 2px solid #ddd; }
        .item-card { border: none; border-radius: 15px; transition: 0.3s; background: white; }
        .item-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.1); transform: translateY(-3px); }
        .btn-like { color: #ccc; cursor: pointer; transition: 0.2s; font-size: 1.2rem; }
        .btn-like.active { color: #e74c3c; }
        .session-badge { background: #eef2ff; color: #4338ca; border-radius: 20px; padding: 5px 15px; margin: 5px; display: inline-block; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">🚀 Neural Discovery Engine</h1>
        <p class="text-muted">Search 1.07M products and 'Like' them to see Sequential AI in action</p>
    </div>

    <div class="row g-4">
        <div class="col-md-5">
            <div class="card p-4 shadow-sm border-0 mb-4" style="border-radius: 20px;">
                <input type="text" id="searchInput" class="form-control search-box" 
                       placeholder="Search e.g. 'Nikon Camera'..." oninput="doSearch(this.value)">
                
                <div id="searchResults" class="mt-4">
                    </div>
            </div>

            <div class="card p-4 shadow-sm border-0" style="border-radius: 20px;">
                <h6>❤️ Items You Liked (Session History)</h6>
                <div id="sessionView" class="mt-2"></div>
            </div>
        </div>

        <div class="col-md-7">
            <h4 class="mb-4 d-flex align-items-center">
                <i class="fas fa-magic text-primary me-2"></i> Predicted For You
            </h4>
            <div id="recGrid" class="row g-3">
                <div class="text-center text-muted mt-5">Like a product to start the Two-Tower GRU Model</div>
            </div>
        </div>
    </div>
</div>

<script>
    let likedItems = [];

    async function doSearch(q) {
        if (q.length < 3) return;
        const res = await fetch(`/keyword_search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        
        let html = "";
        data.forEach(item => {
            html += `
            <div class="d-flex justify-content-between align-items-center mb-3 p-2 border-bottom">
                <div style="font-size: 0.9rem;">${item.title.substring(0, 60)}...</div>
                <i class="fas fa-heart btn-like" onclick="toggleLike('${item.title}', this)"></i>
            </div>`;
        });
        document.getElementById('searchResults').innerHTML = html;
    }

    function toggleLike(title, el) {
        if (!likedItems.includes(title)) {
            likedItems.push(title);
            el.classList.add('active');
            updateSession();
            runInference();
        }
    }

    function updateSession() {
        let html = likedItems.map(t => `<div class="session-badge">${t.substring(0,25)}...</div>`).join('');
        document.getElementById('sessionView').innerHTML = html;
    }

    async function runInference() {
        const grid = document.getElementById('recGrid');
        const res = await fetch('/predict', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({titles: likedItems})
        });
        const data = await res.json();
        
        grid.innerHTML = data.map(item => `
            <div class="col-md-6">
                <div class="card item-card p-3 h-100">
                    <small class="text-primary fw-bold">Ranked Match</small>
                    <div class="mt-2" style="font-size: 0.85rem; font-weight: 500;">${item.title}</div>
                    <div class="mt-auto pt-3 border-top text-muted" style="font-size: 0.7rem;">ASIN: ${item.asin}</div>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
